<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>晴晴的蓮花祈福</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="prayer-app" id="prayerApp" aria-label="為媽媽祈求身體健康的蓮花祈福遊戲">
      <section class="prayer-card">
        <header class="header">
          <h1>為媽媽祈求身體健康</h1>
        </header>

        <section class="lotus-stage" aria-live="polite">
          <div class="halo halo-back"></div>
          <div class="lotus" id="lotus" data-step="0" aria-label="祈願蓮花">
            <svg class="lotus-svg" viewBox="0 0 260 240" role="img" aria-hidden="true">
              <defs>
                <radialGradient id="lotusGlow" cx="50%" cy="42%" r="54%">
                  <stop offset="0%" stop-color="#fff9ca" />
                  <stop offset="46%" stop-color="#ffd86f" stop-opacity="0.86" />
                  <stop offset="100%" stop-color="#ffd86f" stop-opacity="0" />
                </radialGradient>
                <linearGradient id="lotusLine" x1="0" x2="1" y1="0" y2="1">
                  <stop offset="0%" stop-color="#f6a4bc" />
                  <stop offset="48%" stop-color="#d95f86" />
                  <stop offset="100%" stop-color="#8cc5ad" />
                </linearGradient>
                <linearGradient id="lotusTrace" x1="0" x2="1" y1="0" y2="0">
                  <stop offset="0%" stop-color="#f4d16f" />
                  <stop offset="52%" stop-color="#fff9ca" />
                  <stop offset="100%" stop-color="#f6a4bc" />
                </linearGradient>
                <filter id="dotGlow" x="-80%" y="-80%" width="260%" height="260%">
                  <feGaussianBlur stdDeviation="3.4" result="blur" />
                  <feMerge>
                    <feMergeNode in="blur" />
                    <feMergeNode in="SourceGraphic" />
                  </feMerge>
                </filter>
              </defs>
              <ellipse class="svg-shadow" cx="130" cy="212" rx="92" ry="16" />
              <circle class="svg-heart" cx="130" cy="122" r="50" fill="url(#lotusGlow)" />
              <g class="function-lotus">
                <path
                  id="orbitPath"
                  class="orbit-path"
                  d="M130 31C166 70 193 118 224 91C214 145 181 179 130 190C79 179 46 145 36 91C67 118 94 70 130 31Z"
                />
                <path class="lotus-line line-orbit" d="M130 31C166 70 193 118 224 91C214 145 181 179 130 190C79 179 46 145 36 91C67 118 94 70 130 31Z" />
                <path class="lotus-line line-center" d="M130 31C111 79 105 132 130 190C155 132 149 79 130 31Z" />
                <path class="lotus-line line-left-mid" d="M130 190C91 151 70 94 84 52C122 84 139 128 130 190Z" />
                <path class="lotus-line line-right-mid" d="M130 190C169 151 190 94 176 52C138 84 121 128 130 190Z" />
                <path class="lotus-line line-left-outer" d="M130 190C86 180 50 143 34 92C83 98 124 133 130 190Z" />
                <path class="lotus-line line-right-outer" d="M130 190C174 180 210 143 226 92C177 98 136 133 130 190Z" />
                <path class="lotus-line line-cup" d="M62 178C88 205 113 217 130 217C147 217 172 205 198 178C166 190 146 194 130 194C114 194 94 190 62 178Z" />
                <path class="lotus-line line-water" d="M45 216C82 229 178 229 215 216" />
                <circle class="orbit-dot" r="5.5" filter="url(#dotGlow)">
                  <animateMotion dur="5.6s" repeatCount="indefinite" rotate="auto">
                    <mpath href="#orbitPath" />
                  </animateMotion>
                </circle>
              </g>
            </svg>
          </div>
          <div class="water-ring"></div>
        </section>

        <section class="progress" aria-label="祈願進度">
          <span class="lamp" data-lamp="0"></span>
          <span class="lamp" data-lamp="1"></span>
          <span class="lamp" data-lamp="2"></span>
        </section>

        <section class="words">
          <p class="step-text" id="stepText">心中默念一句祝福，然後輕點螢幕</p>
          <p class="counter" id="counterText">已收到 0 / 108 份祝福</p>
        </section>

        <section class="blessing-card" id="blessingCard" hidden>
          <p class="blessing-title" id="blessingTitle">蓮花已開，祝福已至</p>
          <p class="blessing-text" id="blessingText"></p>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
