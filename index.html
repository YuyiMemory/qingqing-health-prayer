<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>晴晴的蓮花祈福</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="prayer-app" id="prayerApp" aria-label="為媽媽祈求身體健康的蓮花祈福遊戲">
      <section class="prayer-card">
        <header class="header">
          <p class="kicker">晴晴的心願</p>
          <h1>為媽媽祈求身體健康</h1>
        </header>

        <section class="lotus-stage" aria-live="polite">
          <div class="halo halo-back"></div>
          <div class="lotus" id="lotus" data-step="0" aria-label="祈願蓮花">
            <span class="petal petal-1"></span>
            <span class="petal petal-2"></span>
            <span class="petal petal-3"></span>
            <span class="petal petal-4"></span>
            <span class="petal petal-5"></span>
            <span class="petal petal-6"></span>
            <span class="heart-light"></span>
          </div>
          <div class="water-ring"></div>
        </section>

        <section class="progress" aria-label="祈願進度">
          <span class="lamp" data-lamp="0"></span>
          <span class="lamp" data-lamp="1"></span>
          <span class="lamp" data-lamp="2"></span>
        </section>

        <section class="words">
          <p class="step-text" id="stepText">心中默念一句祝福，然後輕點螢幕</p>
          <p class="counter" id="counterText">已收到 0 / 108 份祝福</p>
        </section>

        <section class="blessing-card" id="blessingCard" hidden>
          <p class="blessing-title" id="blessingTitle">蓮花已開，祝福已至</p>
          <p class="blessing-text" id="blessingText"></p>
          <button class="action-button" id="againButton" type="button">再祈願一次</button>
        </section>

        <button class="reset-button" id="resetButton" type="button">重新開始 108 祝福</button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
