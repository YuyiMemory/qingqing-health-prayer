<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>晴晴的蓮花祈福</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="prayer-app" id="prayerApp" aria-label="為媽媽祈求身體健康的蓮花祈福遊戲">
      <section class="prayer-card">
        <header class="header">
          <h1>為媽媽祈求身體健康</h1>
        </header>

        <section class="lotus-stage" aria-live="polite">
          <div class="halo halo-back"></div>
          <div class="lotus" id="lotus" data-step="0" aria-label="祈願蓮花">
            <svg class="lotus-svg" viewBox="0 0 260 240" role="img" aria-hidden="true">
              <defs>
                <radialGradient id="lotusGlow" cx="50%" cy="42%" r="54%">
                  <stop offset="0%" stop-color="#fff9ca" />
                  <stop offset="46%" stop-color="#ffd86f" stop-opacity="0.86" />
                  <stop offset="100%" stop-color="#ffd86f" stop-opacity="0" />
                </radialGradient>
                <linearGradient id="petalMain" x1="0" x2="0" y1="0" y2="1">
                  <stop offset="0%" stop-color="#fff4f7" />
                  <stop offset="48%" stop-color="#f6a6ba" />
                  <stop offset="100%" stop-color="#d95f86" />
                </linearGradient>
                <linearGradient id="petalDeep" x1="0" x2="0" y1="0" y2="1">
                  <stop offset="0%" stop-color="#ffdce7" />
                  <stop offset="52%" stop-color="#eb7fa0" />
                  <stop offset="100%" stop-color="#c94f78" />
                </linearGradient>
                <linearGradient id="petalSoft" x1="0" x2="0" y1="0" y2="1">
                  <stop offset="0%" stop-color="#fff7df" />
                  <stop offset="54%" stop-color="#f7c3c9" />
                  <stop offset="100%" stop-color="#dc7390" />
                </linearGradient>
                <linearGradient id="leafGreen" x1="0" x2="1" y1="0" y2="1">
                  <stop offset="0%" stop-color="#99cfa7" />
                  <stop offset="100%" stop-color="#4e9873" />
                </linearGradient>
                <filter id="softShadow" x="-30%" y="-30%" width="160%" height="170%">
                  <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#9d4c69" flood-opacity="0.2" />
                </filter>
              </defs>
              <ellipse class="svg-shadow" cx="130" cy="213" rx="94" ry="17" />
              <circle class="svg-heart" cx="130" cy="122" r="50" fill="url(#lotusGlow)" />
              <g class="lotus-bloom" filter="url(#softShadow)">
                <path class="svg-leaf leaf-left" d="M130 176C96 174 60 188 33 218C76 224 113 210 132 181Z" />
                <path class="svg-leaf leaf-right" d="M130 176C164 174 200 188 227 218C184 224 147 210 128 181Z" />
                <path class="svg-petal outer-left" d="M123 178C81 169 48 134 35 88C83 92 119 126 123 178Z" />
                <path class="svg-petal outer-right" d="M137 178C179 169 212 134 225 88C177 92 141 126 137 178Z" />
                <path class="svg-petal mid-left" d="M126 170C91 151 72 108 78 58C113 75 135 115 126 170Z" />
                <path class="svg-petal mid-right" d="M134 170C169 151 188 108 182 58C147 75 125 115 134 170Z" />
                <path class="svg-petal inner-left" d="M128 166C105 133 108 84 130 42C148 88 148 132 128 166Z" />
                <path class="svg-petal inner-right" d="M132 166C155 133 152 84 130 42C112 88 112 132 132 166Z" />
                <path class="svg-petal center" d="M130 164C106 126 110 76 130 30C150 76 154 126 130 164Z" />
                <path class="svg-cup" d="M72 174C92 201 113 213 130 213C147 213 168 201 188 174C164 184 145 188 130 188C115 188 96 184 72 174Z" />
              </g>
            </svg>
          </div>
          <div class="water-ring"></div>
        </section>

        <section class="progress" aria-label="祈願進度">
          <span class="lamp" data-lamp="0"></span>
          <span class="lamp" data-lamp="1"></span>
          <span class="lamp" data-lamp="2"></span>
        </section>

        <section class="words">
          <p class="step-text" id="stepText">心中默念一句祝福，然後輕點螢幕</p>
          <p class="counter" id="counterText">已收到 0 / 108 份祝福</p>
        </section>

        <section class="blessing-card" id="blessingCard" hidden>
          <p class="blessing-title" id="blessingTitle">蓮花已開，祝福已至</p>
          <p class="blessing-text" id="blessingText"></p>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
